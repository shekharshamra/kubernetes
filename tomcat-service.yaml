apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/name: tomcat-load-balancer
  name: appserver
spec:
  replicas: 5
  selector:
    matchLabels:
      app.kubernetes.io/name: tomcat-load-balancer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tomcat-load-balancer
    spec:
      containers:
      - image: csharma4u/apachetomcat:v1.0
        name: appserver
        ports:
        - containerPort: 8080
